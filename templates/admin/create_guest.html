{% extends "base.html" %}

{% block content %}
<div class="form-card">
    <h2 class="form-title">Create Guest Access</h2>
    <form method="POST">
        <p style="margin-bottom:1rem; color:var(--text-secondary)">Generates a temporary account that auto-expires.
            Credentials will be shown after creation.</p>

        <div class="form-group">
            <label>Access Duration</label>
            <div style="display:flex; gap:10px;">
                <input type="number" name="duration_val" class="form-control" value="1" min="1" required
                    style="width:70px;">
                <select name="duration_unit" class="form-control">
                    <option value="minutes">Minutes</option>
                    <option value="hours" selected>Hours</option>
                    <option value="days">Days</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <button type="submit" class="btn btn-primary">Generate Guest Key</button>
        </div>
        <a href="{{ url_for('admin.dashboard') }}"
            style="display:block; text-align:center; color:var(--text-secondary); margin-top:1rem;">Cancel</a>
    </form>
</div>
{% endblock %}
